name: 'Tool tests'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true
on:  # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  check-qt-import:
    name: '${{ matrix.os }}'
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    env:
      CI_OS_NAME: '${{ matrix.os }}'
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-24.04
          - os: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - run: .tools/setup-xvfb.sh
        name: 'Setup Xvfb'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6
        name: 'Install PySide6'
      - run: .tools/check_qt_import.sh PySide6
        name: 'Check PySide6 importable'
